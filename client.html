<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>合作模式 · 客户端</title>
    <style>
        *{box-sizing:border-box;}
        body{background:#1a1a1a;font-family:'Courier New',monospace;color:#e0e0e0;padding:20px;}
        .panel{max-width:1000px;margin:0 auto;background:#2b2b2b;border:5px solid #7c7c7c;padding:20px;border-radius:1rem;}
        .status-bar{display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:20px;background:#1f1f1f;padding:10px;}
        .boss-area{background:#202020;border:2px solid #c44;padding:20px;text-align:center;margin-bottom:20px;}
        .boss-health{width:100%;height:20px;background:#3a1a1a;border-radius:10px;overflow:hidden;margin:10px 0;}
        .boss-health-fill{background:#c44;height:100%;width:100%;transition:width 0.3s;}
        .players-area{display:flex;gap:20px;margin-bottom:20px;flex-wrap:wrap;}
        .player-card{background:#202020;border:2px solid #5f5f5f;padding:15px;flex:1;text-align:center;}
        .player-card.current-turn{background:#2a4f5a;border:3px solid #ffd966;}
        .card-hand{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin:15px 0;}
        .card{background:#4c4c4c;border:3px solid #a0a0a0;width:110px;padding:10px 5px;text-align:center;cursor:pointer;font-size:0.55rem;}
        .card:active{transform:translateY(2px);}
        .card.disabled{opacity:0.5;cursor:not-allowed;}
        .energy{font-size:1rem;color:#ffd966;text-align:center;margin:10px 0;}
        .log-area{background:#101010;padding:10px;max-height:200px;overflow-y:auto;font-size:0.6rem;margin-top:20px;}
        .log-entry{border-bottom:1px solid #3a3a3a;padding:5px 0;}
        .minecraft-btn{background:#6b6b6b;border:3px solid #a0a0a0;color:white;font-family:monospace;font-size:0.55rem;padding:8px 12px;cursor:pointer;display:inline-block;margin:5px;}
        input{background:#202020;border:2px solid #5f5f5f;padding:8px;color:white;margin:10px;}
    </style>
</head>
<body>
<div class="panel">
    <h2>👤 合作模式 · 客户端</h2>
    <div>
        <input type="text" id="roomCodeInput" placeholder="输入主机房间码">
        <button class="minecraft-btn" id="joinBtn">加入房间</button>
    </div>
    <div class="status-bar">
        <span>状态: <span id="connStatus">未连接</span></span>
    </div>
    <div class="boss-area" id="bossArea">
        <div id="bossName">等待连接...</div>
        <div class="boss-health"><div class="boss-health-fill" id="bossHealthFill"></div></div>
        <div>❤️ <span id="bossHp">0</span>/<span id="bossMaxHp">0</span></div>
        <div>⚔️ 意图: <span id="bossIntent">?</span> <span id="bossIntentValue"></span></div>
        <div>🎯 目标: <span id="bossTarget">-</span></div>
    </div>
    <div class="players-area" id="playersArea"></div>
    <div class="log-area" id="logArea"></div>
    <div>
        <button class="minecraft-btn" id="endTurnBtn">🔚 结束回合</button>
    </div>
</div>
<script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
<script src="cards.js"></script>
<script>
    let peer, conn;
    let myName = localStorage.getItem("yakUsername") || "冒险者";
    
    let myPlayer = {
        id: "client", name: myName,
        hp: 0, maxHp: 0, block: 0, gold: 0, ember: 0,
        strength: 0, weak: 0,
        energy: 3, maxEnergy: 3,
        deck: [], hand: [], discard: [],
        isAlive: true
    };
    
    let hostPlayer = {
        id: "host", name: "主机",
        hp: 0, maxHp: 0, block: 0, strength: 0
    };
    
    let currentBoss = null;
    let currentTurn = "host";
    let gameActive = true;
    
    function shuffleArray(arr) {
        for(let i=arr.length-1;i>0;i--){
            let j = Math.floor(Math.random()*(i+1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
    }
    
    function drawCards(num) {
        for(let i=0;i<num;i++){
            if(myPlayer.deck.length === 0){
                if(myPlayer.discard.length === 0) break;
                myPlayer.deck = [...myPlayer.discard];
                myPlayer.discard = [];
                shuffleArray(myPlayer.deck);
                addLog("洗牌！");
            }
            myPlayer.hand.push(myPlayer.deck.pop());
        }
        refreshUI();
    }
    
    function initMyPlayer() {
        myPlayer.deck = Cards.getInitialDeck();
        myPlayer.hand = [];
        myPlayer.discard = [];
        myPlayer.block = 0;
        myPlayer.energy = myPlayer.maxEnergy;
        myPlayer.strength = 0;
        myPlayer.weak = 0;
        myPlayer.strPotCount = 0;
        myPlayer.hp = myPlayer.maxHp;
        myPlayer.isAlive = true;
        shuffleArray(myPlayer.deck);
        drawCards(5);
    }
    
    function addLog(msg) {
        let logDiv = document.getElementById("logArea");
        let entry = document.createElement("div");
        entry.className = "log-entry";
        entry.innerText = msg;
        logDiv.appendChild(entry);
        entry.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }
    
    function refreshUI() {
        let playersDiv = document.getElementById("playersArea");
        playersDiv.innerHTML = `
            <div class="player-card ${currentTurn === "host" ? "current-turn" : ""}">
                <div>👑 ${hostPlayer.name}</div>
                <div>❤️ ${hostPlayer.hp}/${hostPlayer.maxHp}</div>
                <div>🛡️ 格挡 ${hostPlayer.block}</div>
                <div>💪 力量 ${hostPlayer.strength}</div>
            </div>
            <div class="player-card ${currentTurn === "client" ? "current-turn" : ""}">
                <div>👤 ${myPlayer.name}</div>
                <div>❤️ ${myPlayer.hp}/${myPlayer.maxHp}</div>
                <div>🛡️ 格挡 ${myPlayer.block}</div>
                <div>💪 力量 ${myPlayer.strength}</div>
                <div>⚡ 能量 ${myPlayer.energy}/${myPlayer.maxEnergy}</div>
                <div class="card-hand" id="myHand"></div>
            </div>
        `;
        
        let handDiv = document.getElementById("myHand");
        if(handDiv && myPlayer.hand && currentTurn === "client") {
            handDiv.innerHTML = "";
            for(let i=0;i<myPlayer.hand.length;i++) {
                let card = myPlayer.hand[i];
                let cardDiv = document.createElement("div");
                cardDiv.className = "card";
                if(card.cost > myPlayer.energy) cardDiv.classList.add("disabled");
                cardDiv.innerHTML = `<div>${card.name}</div><div>⚡${card.cost}</div><div style="font-size:0.45rem">${card.desc}</div>`;
                cardDiv.onclick = (function(idx) { return function() { playCard(idx); }; })(i);
                handDiv.appendChild(cardDiv);
            }
        } else if(handDiv && currentTurn !== "client") {
            handDiv.innerHTML = '<div style="color:#aaa">等待你的回合</div>';
        }
        
        if(currentBoss) {
            document.getElementById("bossName").innerText = currentBoss.name;
            document.getElementById("bossHp").innerText = currentBoss.hp;
            document.getElementById("bossMaxHp").innerText = currentBoss.maxHp;
            let percent = (currentBoss.hp / currentBoss.maxHp) * 100;
            document.getElementById("bossHealthFill").style.width = percent + "%";
            let intentText = currentBoss.currentIntent ? currentBoss.currentIntent.type : "?";
            let intentVal = (currentBoss.currentIntent && currentBoss.currentIntent.type === "attack") ? ` ${currentBoss.intentValue}` : "";
            document.getElementById("bossIntent").innerText = intentText;
            document.getElementById("bossIntentValue").innerText = intentVal;
            let targetName = "";
            if(currentBoss.target === "host") targetName = hostPlayer.name;
            else if(currentBoss.target === "client") targetName = myPlayer.name;
            document.getElementById("bossTarget").innerText = targetName || "-";
        }
    }
    
    function resetTurn() {
        // 重置能量和格挡
        myPlayer.energy = myPlayer.maxEnergy;
        myPlayer.block = 0;
        // 抽牌直到手牌5张（回合开始通常抽到5张）
        while(myPlayer.hand.length < 5 && (myPlayer.deck.length > 0 || myPlayer.discard.length > 0)) {
            if(myPlayer.deck.length === 0 && myPlayer.discard.length > 0) {
                myPlayer.deck = [...myPlayer.discard];
                myPlayer.discard = [];
                shuffleArray(myPlayer.deck);
                addLog("洗牌！");
            }
            myPlayer.hand.push(myPlayer.deck.pop());
        }
        refreshUI();
    }
    
    function playCard(index) {
        if(currentTurn !== "client") { addLog("等待你的回合"); return; }
        let card = myPlayer.hand[index];
        if(!card) return;
        if(card.cost > myPlayer.energy) { addLog("能量不足"); return; }
        myPlayer.energy -= card.cost;
        
        if(card.type === "attack") {
            addLog(`打出 ${card.name}`);
            conn.send({ type: "playCard", cardName: card.name });
        } else if(card.type === "skill") {
            if(card.baseBlock) myPlayer.block += card.baseBlock;
            if(card.name === "💪 力量药剂") { myPlayer.strength += 2; myPlayer.strPotCount = (myPlayer.strPotCount||0)+1; }
            if(card.name === "🌿 回春") myPlayer.hp = Math.min(myPlayer.maxHp, myPlayer.hp+5);
            if(card.name === "🔮 洞察") myPlayer.energy++;
            addLog(`打出 ${card.name}`);
            conn.send({ type: "playerUpdate", hp: myPlayer.hp, block: myPlayer.block, energy: myPlayer.energy, strength: myPlayer.strength });
        }
        
        myPlayer.hand.splice(index,1);
        myPlayer.discard.push(card);
        refreshUI();
    }
    
    function endTurn() {
        if(currentTurn !== "client") { addLog("不是你的回合"); return; }
        conn.send({ type: "endTurn" });
        addLog("你结束了回合");
    }
    
    document.getElementById("joinBtn").onclick = () => {
        let roomCode = document.getElementById("roomCodeInput").value.trim();
        if(!roomCode) return;
        addLog(`尝试连接房间: ${roomCode}`);
        peer = new Peer();
        peer.on("open", (id) => {
            addLog(`本地ID: ${id}，正在连接主机...`);
            conn = peer.connect(roomCode);
            setupConnection();
        });
        peer.on("error", (err) => { addLog("Peer错误: " + err); });
    };
    
    function setupConnection() {
        conn.on("open", () => {
            addLog("已连接到主机");
            document.getElementById("connStatus").innerText = "已连接";
            conn.send({ type: "requestState" });
        });
        conn.on("data", (data) => {
            if(data.type === "init") {
                currentBoss = data.boss;
                hostPlayer = data.hostPlayer;
                myPlayer.hp = data.clientPlayer.hp;
                myPlayer.maxHp = data.clientPlayer.maxHp;
                myPlayer.name = data.clientPlayer.name || myName;
                myPlayer.block = data.clientPlayer.block || 0;
                myPlayer.strength = data.clientPlayer.strength || 0;
                myPlayer.energy = data.clientPlayer.energy || 3;
                myPlayer.maxEnergy = data.clientPlayer.maxEnergy || 3;
                currentTurn = data.currentTurn;
                initMyPlayer();
                refreshUI();
                addLog(`BOSS: ${currentBoss.name} (${currentBoss.hp}/${currentBoss.maxHp})`);
                addLog(`当前回合: ${currentTurn === "host" ? hostPlayer.name : myPlayer.name}`);
                if(currentTurn === "client") {
                    resetTurn();
                }
            }
            if(data.type === "bossUpdate") {
                if(currentBoss && data.boss) {
                    currentBoss.hp = data.boss.hp;
                    currentBoss.block = data.boss.block;
                    currentBoss.strength = data.boss.strength;
                    currentBoss.currentIntent = data.boss.intent;
                    currentBoss.intentValue = data.boss.intentValue;
                    currentBoss.target = data.boss.target;
                    refreshUI();
                }
            }
            if(data.type === "turnChange") {
                currentTurn = data.turn;
                refreshUI();
                addLog(`当前回合: ${currentTurn === "host" ? hostPlayer.name : myPlayer.name}`);
                if(currentTurn === "client") {
                    resetTurn();
                }
            }
            if(data.type === "playerUpdate") {
                if(data.player?.id === "host") {
                    hostPlayer.hp = data.player.hp;
                    hostPlayer.block = data.player.block;
                } else {
                    if(data.hp !== undefined) myPlayer.hp = data.hp;
                    if(data.block !== undefined) myPlayer.block = data.block;
                    if(data.energy !== undefined) myPlayer.energy = data.energy;
                    if(data.strength !== undefined) myPlayer.strength = data.strength;
                }
                refreshUI();
            }
            if(data.type === "resetTurn") {
                resetTurn();
            }
            if(data.type === "gameEnd") {
                alert(`游戏${data.result === "victory" ? "胜利！" : "失败"}`);
                window.location.href = "index.html";
            }
        });
        conn.on("close", () => {
            addLog("连接断开");
            document.getElementById("connStatus").innerText = "已断开";
        });
    }
    
    document.getElementById("endTurnBtn").onclick = endTurn;
</script>
</body>
</html>
