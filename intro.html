<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>梦想大陆 · 序章</title>
    <style>
        @font-face {
            font-family: 'Minecraft';
            src: url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            background: #0a0f1a;
            font-family: 'Press Start 2P', monospace;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .intro-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #0a1a2a, #010a0f);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            animation: fadeIn 2s ease;
        }
        .story-text {
            max-width: 800px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 2rem;
            border: 2px solid #ffd966;
            color: #e0e0e0;
            font-size: 0.9rem;
            line-height: 1.8;
            text-align: center;
            animation: slideUp 1.5s ease-out;
        }
        .skip-btn {
            position: absolute;
            bottom: 30px;
            right: 30px;
            background: #2c6b7a;
            border: 2px solid #7acfd9;
            color: white;
            font-family: monospace;
            font-size: 0.6rem;
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 2rem;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<div class="intro-container">
    <div class="story-text" id="storyContent"></div>
    <button class="skip-btn" id="skipBtn">跳过动画 ▶</button>
</div>
<script>
    const storyLines = [
        "在梦想大陆的尽头，矗立着一座古老的世界之塔。",
        "传说塔顶封印着「神之识」——能够重塑世界的力量。",
        "然而，千年前一场名为「冷日计划」的灾难，让塔内滋生出无数怪物与诅咒。",
        "如今，ET-01 的阴影再次笼罩大陆，各个位面开始交错。",
        "你，一位被渡河力量选中的观测者，肩负起攀登高塔、重铸命运的重任。",
        "「勇者啊，你的每一次抉择，都在改写命运的丝线。」",
        "—— 判官 Yakhoo123"
    ];
    let index = 0;
    const contentDiv = document.getElementById("storyContent");
    function showNextLine() {
        if (index < storyLines.length) {
            let p = document.createElement("p");
            p.innerText = storyLines[index];
            p.style.marginBottom = "15px";
            p.style.opacity = "0";
            p.style.transform = "translateY(10px)";
            p.style.transition = "all 0.5s";
            contentDiv.appendChild(p);
            setTimeout(() => { p.style.opacity = "1"; p.style.transform = "translateY(0)"; }, 50);
            index++;
            setTimeout(showNextLine, 2000);
        } else {
            // 动画结束，标记已播放，然后根据是否有待新游戏标志决定跳转
            setTimeout(() => {
                localStorage.setItem("introPlayed", "true");
                let pending = localStorage.getItem("introPending");
                if(pending === "true"){
                    localStorage.removeItem("introPending");
                    localStorage.removeItem("YakRun");
                    window.location.href = "game.html";
                } else {
                    window.location.href = "index.html";
                }
            }, 1000);
        }
    }
    showNextLine();
    document.getElementById("skipBtn").onclick = () => {
        localStorage.setItem("introPlayed", "true");
        let pending = localStorage.getItem("introPending");
        if(pending === "true"){
            localStorage.removeItem("introPending");
            localStorage.removeItem("YakRun");
            window.location.href = "game.html";
        } else {
            window.location.href = "index.html";
        }
    };
</script>
</body>
</html>
