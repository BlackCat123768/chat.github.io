<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Yak's Adventure · 世界之塔</title>
    <style>
        /* 样式保持原样，略（同之前） */
        @font-face { font-family: 'Minecraft'; src: url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap'); }
        *{box-sizing:border-box;image-rendering:pixelated;}
        body{ background:#1a1a1a; font-family:'Press Start 2P',monospace; padding:16px; color:#e0e0e0; margin:0; }
        .game-panel { max-width:1200px; margin:0 auto; background:#2b2b2b; border:5px solid #7c7c7c; overflow:hidden; position:relative; }
        .status-bar { background:#1f1f1f; padding:12px; display:flex; flex-wrap:wrap; justify-content:space-between; align-items:center; font-size:0.55rem; border-bottom:3px solid #6b6b6b; gap:8px; }
        .battle-area { padding:20px; }
        .enemies-container { display:flex; flex-wrap:wrap; gap:16px; margin-bottom:20px; justify-content:center; }
        .enemy-card { background:#202020; border:2px solid #5f5f5f; padding:12px; width:180px; text-align:center; cursor:pointer; }
        .enemy-card.selected { border:3px solid #ffd966; background:#2a2a2a; }
        .health-bar-sm { background:#3a1a1a; height:8px; width:100%; margin:6px 0; border-radius:4px; overflow:hidden; }
        .health-fill-sm { background:#c44; height:100%; width:100%; }
        .player-area { background:#202020; border:2px solid #5f5f5f; padding:15px; margin-top:10px; }
        .card-hand { display:flex; flex-wrap:wrap; gap:12px; justify-content:center; margin:15px 0; }
        .card { background:#4c4c4c; border:3px solid #a0a0a0; width:110px; padding:10px 5px; text-align:center; cursor:pointer; font-size:0.55rem; }
        .card:active { transform:translateY(2px); }
        .card.disabled { opacity:0.5; cursor:not-allowed; }
        .card.curse { background:#5a3a3a; border-color:#b07a7a; }
        .energy { font-size:1rem; color:#ffd966; text-align:center; margin:10px 0; }
        .log-area { background:#101010; border-top:2px solid #5f5f5f; padding:10px; max-height:200px; overflow-y:auto; font-size:0.55rem; line-height:1.4; }
        .log-entry { border-bottom:1px solid #3a3a3a; padding:4px 0; white-space:pre-wrap; }
        .glitch-log { color:#ffaa66; text-shadow:0 0 2px red; }
        .minecraft-btn { background:#6b6b6b; border:3px solid #a0a0a0; color:white; font-family:'Press Start 2P',monospace; font-size:0.55rem; padding:8px 12px; cursor:pointer; display:inline-block; margin:5px; }
        .minecraft-btn:active { transform:translateY(2px); }
        .float-number { position:absolute; font-size:1.2rem; font-weight:bold; pointer-events:none; animation:floatUp 0.6s ease-out forwards; z-index:100; text-shadow:1px 1px 0 black; }
        @keyframes floatUp { 0% { opacity:1; transform:translateY(0); } 100% { opacity:0; transform:translateY(-40px); } }
        footer { font-size:0.45rem; text-align:center; padding:8px; background:#1a1a1a; color:#8b8b8b; }
        .story-text { background:#202020; padding:15px; min-height:100px; font-size:0.6rem; line-height:1.5; white-space:pre-wrap; }
        .map-nodes { display:flex; flex-direction:column; gap:15px; padding:15px; }
        .floor-row { display:flex; justify-content:center; gap:20px; flex-wrap:wrap; }
        .map-node { background:#1f3a3f; border:2px solid #6b9eaa; padding:10px 15px; width:120px; text-align:center; cursor:pointer; font-size:0.55rem; }
        .map-node:hover { background:#2d5f68; }
        .settle-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); backdrop-filter:blur(8px); z-index:2000; display:flex; justify-content:center; align-items:center; flex-direction:column; animation:fadeIn 0.3s ease; }
        .settle-card { background:#2b2b2b; border:6px solid #ffd966; padding:2rem; text-align:center; max-width:500px; width:80%; }
        .reward-grid { display:flex; gap:10px; justify-content:center; margin:15px 0; flex-wrap:wrap; }
        @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
        .loading-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:#0a0f1aee; backdrop-filter:blur(10px); z-index:3000; display:flex; justify-content:center; align-items:center; flex-direction:column; transition:opacity 0.5s ease; }
        .loading-spinner { width:48px; height:48px; border:6px solid #6b6b6b; border-top:6px solid #ffd966; border-radius:50%; animation:spin 1s linear infinite; margin-bottom:30px; }
        @keyframes spin { 0% { transform:rotate(0deg); } 100% { transform:rotate(360deg); } }
    </style>
</head>
<body>
<div class="game-panel" id="gameRoot">
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text" id="loadingText">正在生成世界之塔...</div>
    </div>
    <div class="status-bar">
        <span>❤️ <span id="hpVal">0</span>/<span id="maxHpVal">0</span></span>
        <span>🛡️ 格挡 <span id="blockVal">0</span></span>
        <span>💪 力量 <span id="strengthVal">0</span></span>
        <span>💰 <span id="goldVal">0</span></span>
        <span>🗼 第 <span id="chapterVal">1</span>/3 章</span>
        <span>✨ 余烬: <span id="emberVal">0</span></span>
        <span>⭐ Lv <span id="levelVal">1</span></span>
        <span>📌 剩余 <span id="pointsVal">0</span> 点</span>
        <button class="minecraft-btn" id="openLevelUpBtn" style="padding:4px 8px; font-size:0.5rem;">📈 属性</button>
    </div>
    <div id="battleUI" style="display:none;">
        <div class="battle-area">
            <div class="enemies-container" id="enemiesContainer"></div>
            <div class="player-area">
                <div class="energy">⚡ 能量: <span id="energyVal">0</span>/<span id="maxEnergy">3</span></div>
                <div class="card-hand" id="handCards"></div>
                <div style="display:flex; justify-content:center; gap:10px; margin-top:10px;">
                    <div class="minecraft-btn" id="endTurnBtn">🔚 结束回合</div>
                    <div class="minecraft-btn" id="surrenderBtn">🏳️ 投降</div>
                </div>
            </div>
        </div>
    </div>
    <div id="mapUI">
        <div class="story-text" id="storyTxt"></div>
        <div id="mapContainer"></div>
    </div>
    <div class="log-area" id="logArea"><div class="log-entry">✨ 游戏开始，踏上爬塔之旅</div></div>
    <footer>「卡牌对战 · 每回合3能量 · 敌人AI动态变化 · 属性点影响战斗」</footer>
</div>
<script src="gameBase.js"></script>
<script src="gameExt.js"></script>
</body>
</html>
