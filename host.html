<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>合作模式 · 主机</title>
    <style>
        *{box-sizing:border-box;}
        body{background:#1a1a1a;font-family:'Courier New',monospace;color:#e0e0e0;padding:20px;}
        .panel{max-width:1000px;margin:0 auto;background:#2b2b2b;border:5px solid #7c7c7c;padding:20px;border-radius:1rem;}
        .status-bar{display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:20px;background:#1f1f1f;padding:10px;}
        .boss-area{background:#202020;border:2px solid #c44;padding:20px;text-align:center;margin-bottom:20px;}
        .boss-health{width:100%;height:20px;background:#3a1a1a;border-radius:10px;overflow:hidden;margin:10px 0;}
        .boss-health-fill{background:#c44;height:100%;width:100%;transition:width 0.3s;}
        .players-area{display:flex;gap:20px;margin-bottom:20px;flex-wrap:wrap;}
        .player-card{background:#202020;border:2px solid #5f5f5f;padding:15px;flex:1;text-align:center;}
        .player-card.current-turn{background:#2a4f5a;border:3px solid #ffd966;}
        .card-hand{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin:15px 0;}
        .card{background:#4c4c4c;border:3px solid #a0a0a0;width:110px;padding:10px 5px;text-align:center;cursor:pointer;font-size:0.55rem;}
        .card.disabled{opacity:0.5;cursor:not-allowed;}
        .energy{font-size:1rem;color:#ffd966;text-align:center;margin:10px 0;}
        .log-area{background:#101010;padding:10px;max-height:200px;overflow-y:auto;font-size:0.6rem;margin-top:20px;}
        .log-entry{border-bottom:1px solid #3a3a3a;padding:5px 0;}
        .minecraft-btn{background:#6b6b6b;border:3px solid #a0a0a0;color:white;font-family:monospace;font-size:0.55rem;padding:8px 12px;cursor:pointer;display:inline-block;margin:5px;}
        .room-code{font-size:1.2rem;color:#ffd966;word-break:break-all;}
    </style>
</head>
<body>
<div class="panel">
    <h2>👑 合作模式 · 主机</h2>
    <div class="status-bar">
        <span>房间码: <span id="roomCode" class="room-code">生成中...</span></span>
        <span>状态: <span id="connStatus">等待连接</span></span>
    </div>
    <div class="boss-area" id="bossArea">
        <div id="bossName">等待生成...</div>
        <div class="boss-health"><div class="boss-health-fill" id="bossHealthFill"></div></div>
        <div>❤️ <span id="bossHp">0</span>/<span id="bossMaxHp">0</span></div>
        <div>⚔️ 意图: <span id="bossIntent">?</span> <span id="bossIntentValue"></span></div>
        <div>🎯 目标: <span id="bossTarget">-</span></div>
    </div>
    <div class="players-area" id="playersArea"></div>
    <div class="log-area" id="logArea"></div>
    <div>
        <button class="minecraft-btn" id="endTurnBtn">🔚 结束回合</button>
        <button class="minecraft-btn" id="backBtn">返回主菜单</button>
    </div>
</div>
<script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
<script src="cards.js"></script>
<script>
    const username = localStorage.getItem("yakUsername") || "主机";
    
    // 主机玩家数据
    let hostPlayer = {
        id: "host", name: username,
        hp: 45, maxHp: 45, block: 0, gold: 25, ember: 0,
        strength: 0, weak: 0, strPotCount: 0,
        energy: 3, maxEnergy: 3,
        deck: [], hand: [], discard: [],
        isAlive: true
    };
    
    // 客户端玩家数据（主机只存储基础状态，手牌由客户端自己管理）
    let clientPlayer = {
        id: "client", name: "客户端",
        hp: 45, maxHp: 45, block: 0, gold: 0, ember: 0,
        strength: 0, weak: 0, strPotCount: 0,
        energy: 3, maxEnergy: 3,
        hand: [],   // 添加 hand 数组防止 undefined
        deck: [],
        discard: [],
        isAlive: true
    };
    
    let currentBoss = null;
    let currentTurn = "host";
    let gameActive = true;
    let peer, conn, roomCode;
    
    // 辅助函数
    function shuffleArray(arr) {
        for(let i=arr.length-1;i>0;i--){
            let j = Math.floor(Math.random()*(i+1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
    }
    
    function drawCards(player, num) {
        for(let i=0;i<num;i++){
            if(player.deck.length === 0){
                if(player.discard.length === 0) break;
                player.deck = [...player.discard];
                player.discard = [];
                shuffleArray(player.deck);
                addLog(`${player.name} 洗牌！`);
            }
            player.hand.push(player.deck.pop());
        }
        refreshUI();
    }
    
    function initPlayer(player) {
        player.deck = Cards.getInitialDeck();
        player.hand = [];
        player.discard = [];
        player.block = 0;
        player.energy = player.maxEnergy;
        player.strength = 0;
        player.weak = 0;
        player.strPotCount = 0;
        player.hp = player.maxHp;
        player.isAlive = true;
        shuffleArray(player.deck);
        drawCards(player, 5);
    }
    
    // Boss类
    class Boss {
        constructor(name, hp, attack) {
            this.name = name;
            this.maxHp = hp;
            this.hp = hp;
            this.attack = attack;
            this.block = 0;
            this.currentIntent = null;
            this.intentValue = 0;
            this.strength = 0;
            this.turnCount = 0;
            this.target = null;
            this.intentSequence = [
                { type:"attack", damage:0 }, { type:"defend", block:8 },
                { type:"buff", buffType:"strength", value:2 }, { type:"attack", damage:0 },
                { type:"debuff", debuffType:"weak", value:1 }
            ];
        }
        chooseIntent() {
            let idx = this.turnCount % this.intentSequence.length;
            let baseIntent = this.intentSequence[idx];
            this.currentIntent = { ...baseIntent };
            if(this.currentIntent.type === "attack") {
                this.intentValue = (this.currentIntent.damage || this.attack) + this.strength;
                let alive = [];
                if(hostPlayer.isAlive) alive.push("host");
                if(clientPlayer.isAlive) alive.push("client");
                this.target = alive.length > 0 ? alive[Math.floor(Math.random() * alive.length)] : null;
            } else if(this.currentIntent.type === "defend") {
                this.intentValue = this.currentIntent.block || 5;
            } else if(this.currentIntent.type === "buff") {
                this.intentValue = this.currentIntent.value || 0;
            } else if(this.currentIntent.type === "debuff") {
                this.intentValue = this.currentIntent.value || 0;
                let alive = [];
                if(hostPlayer.isAlive) alive.push("host");
                if(clientPlayer.isAlive) alive.push("client");
                this.target = alive.length > 0 ? alive[Math.floor(Math.random() * alive.length)] : null;
            }
            this.turnCount++;
        }
        executeIntent() {
            let intent = this.currentIntent;
            if(!intent) return null;
            switch(intent.type) {
                case "attack":
                    let targetPlayer = this.target === "host" ? hostPlayer : clientPlayer;
                    if(targetPlayer && targetPlayer.isAlive) {
                        let damage = Math.max(0, this.intentValue - targetPlayer.block);
                        if(damage > 0) {
                            targetPlayer.hp -= damage;
                            addLog(`${this.name} 攻击 ${targetPlayer.name}，造成 ${damage} 伤害！`);
                        } else {
                            addLog(`${this.name} 攻击 ${targetPlayer.name}，被完全格挡！`);
                        }
                        targetPlayer.block = 0;
                        if(targetPlayer.hp <= 0) { targetPlayer.isAlive = false; addLog(`${targetPlayer.name} 倒下了！`); }
                    }
                    return { type:"attack", value:this.intentValue, target:this.target };
                case "defend":
                    this.block += this.intentValue;
                    addLog(`${this.name} 获得 ${this.intentValue} 格挡。`);
                    return null;
                case "buff":
                    if(intent.buffType === "strength"){ this.strength += this.intentValue; addLog(`${this.name} 力量 +${this.intentValue}！`); }
                    return null;
                case "debuff":
                    let debuffTarget = this.target === "host" ? hostPlayer : clientPlayer;
                    if(debuffTarget && debuffTarget.isAlive) {
                        debuffTarget.weak = (debuffTarget.weak || 0) + this.intentValue;
                        addLog(`${debuffTarget.name} 被虚弱了！`);
                    }
                    return null;
                default: return null;
            }
        }
    }
    
    function generateBoss() {
        let bosses = [
            { name: "石像守卫", hp: 100, attack: 12 },
            { name: "暗影魔像", hp: 120, attack: 15 },
            { name: "烈焰巨人", hp: 140, attack: 18 }
        ];
        let b = bosses[Math.floor(Math.random() * bosses.length)];
        return new Boss(b.name, b.hp, b.attack);
    }
    
    function playCard(index, player) {
        if(!gameActive) return;
        if(currentTurn !== player.id) { addLog("请等待你的回合"); return; }
        let card = player.hand[index];
        if(card.cost > player.energy) return;
        player.energy -= card.cost;
        
        if(card.type === "attack") {
            let damage = card.baseDamage + (player.strength||0);
            if(player.weak) damage = Math.floor(damage * 0.5);
            damage = Math.max(1, damage - currentBoss.block);
            let blocked = Math.min(currentBoss.block, card.baseDamage + (player.strength||0));
            if(blocked>0) currentBoss.block -= blocked;
            currentBoss.hp -= damage;
            addLog(`${player.name} 打出 ${card.name}，对 BOSS 造成 ${damage} 伤害！`);
            broadcast({ type: "bossUpdate", boss: { hp: currentBoss.hp, block: currentBoss.block, strength: currentBoss.strength, intent: currentBoss.currentIntent, intentValue: currentBoss.intentValue, target: currentBoss.target } });
            if(currentBoss.hp <= 0) victory();
        } else if(card.type === "skill") {
            if(card.baseBlock) player.block += card.baseBlock;
            if(card.name === "💪 力量药剂") { player.strength += 2; player.strPotCount++; }
            if(card.name === "🌿 回春") player.hp = Math.min(player.maxHp, player.hp+5);
            if(card.name === "🔮 洞察") player.energy++;
            addLog(`${player.name} 打出 ${card.name}`);
        }
        player.hand.splice(index,1);
        player.discard.push(card);
        refreshUI();
        broadcast({ type: "playerUpdate", player: { id: player.id, hp: player.hp, block: player.block, energy: player.energy } });
    }
    
    function endTurn() {
        if(!gameActive) return;
        if(currentTurn === "host") {
            currentTurn = "client";
            addLog("轮到客户端回合");
            broadcast({ type: "turnChange", turn: "client" });
            refreshUI();
        } else {
            currentTurn = "host";
            bossAttack();
            addLog("轮到主机回合");
            broadcast({ type: "turnChange", turn: "host" });
            refreshUI();
        }
    }
    
    function bossAttack() {
        if(!gameActive) return;
        currentBoss.executeIntent();
        refreshUI();
        broadcast({ type: "bossUpdate", boss: { hp: currentBoss.hp, block: currentBoss.block, strength: currentBoss.strength, intent: currentBoss.currentIntent, intentValue: currentBoss.intentValue, target: currentBoss.target } });
        broadcast({ type: "playerUpdate", player: { id: "host", hp: hostPlayer.hp, block: hostPlayer.block } });
        broadcast({ type: "playerUpdate", player: { id: "client", hp: clientPlayer.hp, block: clientPlayer.block } });
        
        if(!hostPlayer.isAlive && !clientPlayer.isAlive) defeat();
        else if(!hostPlayer.isAlive && clientPlayer.isAlive) {
            addLog("主机倒下了，客户端独自战斗");
            currentTurn = "client";
            broadcast({ type: "turnChange", turn: "client" });
        } else if(hostPlayer.isAlive && !clientPlayer.isAlive) {
            addLog("客户端倒下了，主机独自战斗");
            currentTurn = "host";
        }
        
        if(currentTurn === "host") {
            hostPlayer.energy = hostPlayer.maxEnergy;
            hostPlayer.block = 0;
            drawCards(hostPlayer, 5);
        } else {
            broadcast({ type: "resetTurn" });
        }
        currentBoss.block = 0;
        currentBoss.chooseIntent();
        refreshUI();
    }
    
    function victory() {
        addLog("🎉 胜利！击败BOSS！");
        gameActive = false;
        broadcast({ type: "gameEnd", result: "victory" });
        setTimeout(() => { alert("合作胜利！返回主菜单"); window.location.href = "index.html"; }, 2000);
    }
    
    function defeat() {
        addLog("💀 战败...");
        gameActive = false;
        broadcast({ type: "gameEnd", result: "defeat" });
        setTimeout(() => { alert("战斗失败，返回主菜单"); window.location.href = "index.html"; }, 2000);
    }
    
    function addLog(msg) {
        let logDiv = document.getElementById("logArea");
        let entry = document.createElement("div");
        entry.className = "log-entry";
        entry.innerText = msg;
        logDiv.appendChild(entry);
        entry.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }
    
    function refreshUI() {
        let playersDiv = document.getElementById("playersArea");
        playersDiv.innerHTML = `
            <div class="player-card ${currentTurn === "host" ? "current-turn" : ""}">
                <div>👑 ${hostPlayer.name}</div>
                <div>❤️ ${hostPlayer.hp}/${hostPlayer.maxHp}</div>
                <div>🛡️ 格挡 ${hostPlayer.block}</div>
                <div>💪 力量 ${hostPlayer.strength}</div>
                <div>⚡ 能量 ${hostPlayer.energy}/${hostPlayer.maxEnergy}</div>
                <div>🎴 手牌 ${hostPlayer.hand.length}</div>
                <div class="card-hand" id="hostHand"></div>
            </div>
            <div class="player-card ${currentTurn === "client" ? "current-turn" : ""}">
                <div>👤 ${clientPlayer.name}</div>
                <div>❤️ ${clientPlayer.hp}/${clientPlayer.maxHp}</div>
                <div>🛡️ 格挡 ${clientPlayer.block}</div>
                <div>💪 力量 ${clientPlayer.strength}</div>
                <div>⚡ 能量 ${clientPlayer.energy}/${clientPlayer.maxEnergy}</div>
                <div>🎴 手牌 ${clientPlayer.hand.length}</div>
            </div>
        `;
        
        let hostHandDiv = document.getElementById("hostHand");
        if(hostHandDiv && currentTurn === "host") {
            hostHandDiv.innerHTML = "";
            for(let i=0;i<hostPlayer.hand.length;i++) {
                let card = hostPlayer.hand[i];
                let cardDiv = document.createElement("div");
                cardDiv.className = "card";
                if(card.cost > hostPlayer.energy) cardDiv.classList.add("disabled");
                cardDiv.innerHTML = `<div>${card.name}</div><div>⚡${card.cost}</div><div style="font-size:0.45rem">${card.desc}</div>`;
                cardDiv.onclick = (function(idx) { return function() { playCard(idx, hostPlayer); }; })(i);
                hostHandDiv.appendChild(cardDiv);
            }
        }
        
        if(currentBoss) {
            document.getElementById("bossName").innerText = currentBoss.name;
            document.getElementById("bossHp").innerText = currentBoss.hp;
            document.getElementById("bossMaxHp").innerText = currentBoss.maxHp;
            let percent = (currentBoss.hp / currentBoss.maxHp) * 100;
            document.getElementById("bossHealthFill").style.width = percent + "%";
            let intentText = currentBoss.currentIntent ? currentBoss.currentIntent.type : "?";
            let intentVal = (currentBoss.currentIntent && currentBoss.currentIntent.type === "attack") ? ` ${currentBoss.intentValue}` : "";
            document.getElementById("bossIntent").innerText = intentText;
            document.getElementById("bossIntentValue").innerText = intentVal;
            let targetName = "";
            if(currentBoss.target === "host") targetName = hostPlayer.name;
            else if(currentBoss.target === "client") targetName = clientPlayer.name;
            document.getElementById("bossTarget").innerText = targetName || "-";
        }
    }
    
    function broadcast(data) {
        if(conn && conn.open) conn.send(data);
    }
    
    function createRoom() {
        peer = new Peer();
        peer.on("open", (id) => {
            roomCode = id;
            document.getElementById("roomCode").innerText = roomCode;
            document.getElementById("connStatus").innerText = "等待客户端连接...";
            addLog(`房间已创建，房间码: ${roomCode}`);
        });
        peer.on("connection", (c) => {
            conn = c;
            document.getElementById("connStatus").innerText = "客户端已连接";
            addLog("客户端已连接");
            
            // 生成 Boss 并初始化主机
            currentBoss = generateBoss();
            initPlayer(hostPlayer);
            // 初始化客户端基础状态
            clientPlayer.hp = 45;
            clientPlayer.maxHp = 45;
            clientPlayer.block = 0;
            clientPlayer.energy = 3;
            clientPlayer.maxEnergy = 3;
            clientPlayer.strength = 0;
            clientPlayer.weak = 0;
            clientPlayer.isAlive = true;
            clientPlayer.hand = [];   // 确保 hand 存在
            currentBoss.chooseIntent();
            currentTurn = "host";
            gameActive = true;
            refreshUI();
            
            // 发送初始化数据
            conn.send({
                type: "init",
                boss: { name: currentBoss.name, maxHp: currentBoss.maxHp, hp: currentBoss.hp, block: currentBoss.block, strength: currentBoss.strength, intent: currentBoss.currentIntent, intentValue: currentBoss.intentValue, target: currentBoss.target },
                hostPlayer: { name: hostPlayer.name, hp: hostPlayer.hp, maxHp: hostPlayer.maxHp, block: hostPlayer.block, strength: hostPlayer.strength },
                clientPlayer: {
                    name: clientPlayer.name,
                    hp: clientPlayer.hp,
                    maxHp: clientPlayer.maxHp,
                    block: clientPlayer.block,
                    strength: clientPlayer.strength,
                    energy: clientPlayer.energy,
                    maxEnergy: clientPlayer.maxEnergy
                },
                currentTurn: currentTurn
            });
            
            c.on("data", (data) => {
                if(data.type === "playCard") {
                    let cardName = data.cardName;
                    let card = Cards.get(cardName);
                    if(!card) return;
                    if(card.type === "attack") {
                        let damage = card.baseDamage + (clientPlayer.strength||0);
                        if(clientPlayer.weak) damage = Math.floor(damage * 0.5);
                        damage = Math.max(1, damage - currentBoss.block);
                        let blocked = Math.min(currentBoss.block, card.baseDamage + (clientPlayer.strength||0));
                        if(blocked>0) currentBoss.block -= blocked;
                        currentBoss.hp -= damage;
                        addLog(`${clientPlayer.name} 打出 ${card.name}，对 BOSS 造成 ${damage} 伤害！`);
                        broadcast({ type: "bossUpdate", boss: { hp: currentBoss.hp, block: currentBoss.block, strength: currentBoss.strength, intent: currentBoss.currentIntent, intentValue: currentBoss.intentValue, target: currentBoss.target } });
                        if(currentBoss.hp <= 0) victory();
                    } else if(card.type === "skill") {
                        addLog(`${clientPlayer.name} 打出 ${card.name}`);
                    }
                }
                if(data.type === "playerUpdate") {
                    clientPlayer.hp = data.hp;
                    clientPlayer.block = data.block;
                    clientPlayer.energy = data.energy;
                    clientPlayer.strength = data.strength;
                    refreshUI();
                }
                if(data.type === "endTurn") {
                    if(currentTurn === "client") {
                        currentTurn = "host";
                        bossAttack();
                        addLog("轮到主机回合");
                        broadcast({ type: "turnChange", turn: "host" });
                        refreshUI();
                    }
                }
                if(data.type === "requestState") {
                    conn.send({
                        type: "init",
                        boss: { name: currentBoss.name, maxHp: currentBoss.maxHp, hp: currentBoss.hp, block: currentBoss.block, strength: currentBoss.strength, intent: currentBoss.currentIntent, intentValue: currentBoss.intentValue, target: currentBoss.target },
                        hostPlayer: { name: hostPlayer.name, hp: hostPlayer.hp, maxHp: hostPlayer.maxHp, block: hostPlayer.block, strength: hostPlayer.strength },
                        clientPlayer: {
                            name: clientPlayer.name,
                            hp: clientPlayer.hp,
                            maxHp: clientPlayer.maxHp,
                            block: clientPlayer.block,
                            strength: clientPlayer.strength,
                            energy: clientPlayer.energy,
                            maxEnergy: clientPlayer.maxEnergy
                        },
                        currentTurn: currentTurn
                    });
                }
            });
            c.on("close", () => {
                addLog("客户端断开连接");
                document.getElementById("connStatus").innerText = "客户端已断开";
            });
        });
        peer.on("error", (err) => { addLog("Peer错误: " + err); });
    }
    
    createRoom();
    document.getElementById("endTurnBtn").onclick = endTurn;
    document.getElementById("backBtn").onclick = () => window.location.href = "index.html";
</script>
</body>
</html>
