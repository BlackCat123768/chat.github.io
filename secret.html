<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>冷日计划 · 独立篇章</title>
    <style>
        @font-face {
            font-family: 'Minecraft';
            src: url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        }
        *{box-sizing:border-box;}
        body{
            background: #0a0f1a;
            font-family: 'Press Start 2P', monospace;
            padding: 16px;
            color: #d4f1f9;
            margin: 0;
        }
        .secret-panel {
            max-width: 900px;
            margin: 0 auto;
            background: #0b1a22dd;
            backdrop-filter: blur(10px);
            border: 3px solid #5f9ea0;
            border-radius: 2rem;
            overflow: hidden;
            box-shadow: 0 0 30px #2fbfd6;
        }
        .status-bar {
            background: #041016;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            font-size: 0.65rem;
            border-bottom: 2px solid #2c7a7c;
        }
        .story-area {
            background: #031016cc;
            padding: 25px;
            min-height: 280px;
            font-size: 0.7rem;
            line-height: 1.7;
            white-space: pre-wrap;
            border-bottom: 2px solid #2c7a7c;
        }
        .choices-area {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .choice-btn {
            background: #1c4f5c;
            border: 2px solid #6fbfcf;
            color: #f0fcff;
            font-family: 'Press Start 2P', monospace;
            font-size: 0.6rem;
            padding: 12px;
            cursor: pointer;
            text-align: left;
            transition: 0.1s;
        }
        .choice-btn:active { transform: translateY(2px); background: #2a6b7a; }
        .battle-area {
            display: none;
            padding: 20px;
        }
        .enemies-container { display: flex; gap: 20px; justify-content: center; margin-bottom: 20px; }
        .enemy-card {
            background: #1a2f36;
            border: 2px solid #4c9ead;
            padding: 12px;
            width: 200px;
            text-align: center;
            border-radius: 1rem;
        }
        .enemy-card.selected { border: 3px solid #ffd966; background: #2a4f5a; }
        .health-bar-sm {
            background: #3a1a1a;
            height: 8px;
            width: 100%;
            margin: 6px 0;
            border-radius: 4px;
            overflow: hidden;
        }
        .health-fill-sm { background: #c44; height: 100%; width: 100%; }
        .player-area {
            background: #1a2f36;
            border: 2px solid #4c9ead;
            padding: 15px;
            margin-top: 10px;
            border-radius: 1rem;
        }
        .card-hand {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin: 15px 0;
        }
        .card {
            background: #3c5c66;
            border: 3px solid #89cedf;
            width: 110px;
            padding: 10px 5px;
            text-align: center;
            cursor: pointer;
            font-size: 0.55rem;
            border-radius: 1rem;
        }
        .card:active { transform: translateY(2px); }
        .card.disabled { opacity: 0.5; cursor: not-allowed; }
        .energy { font-size: 1rem; color: #ffd966; text-align: center; margin: 10px 0; }
        .log-area {
            background: #010a0e;
            padding: 10px;
            max-height: 150px;
            overflow-y: auto;
            font-size: 0.5rem;
            border-top: 1px solid #2c7a7c;
        }
        .log-entry { border-bottom: 1px solid #2c5f66; padding: 4px 0; }
        .minecraft-btn {
            background: #2c6b7a;
            border: 2px solid #7acfd9;
            color: white;
            font-family: monospace;
            font-size: 0.55rem;
            padding: 8px 12px;
            cursor: pointer;
            display: inline-block;
            margin: 5px;
            border-radius: 2rem;
        }
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #010a0f;
            backdrop-filter: blur(15px);
            z-index: 3000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 6px solid #2c7a7c;
            border-top: 6px solid #ffd966;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-text { margin-top: 20px; font-size: 0.7rem; }
        .settle-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(8px);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .settle-card {
            background: #2b2b2b;
            border: 6px solid #ffd966;
            padding: 2rem;
            text-align: center;
            max-width: 500px;
            width: 80%;
        }
    </style>
</head>
<body>
<div class="secret-panel">
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">正在加载冷日档案...</div>
    </div>
    <div class="status-bar">
        <span>❤️ <span id="hpVal">0</span>/<span id="maxHpVal">0</span></span>
        <span>🛡️ 格挡 <span id="blockVal">0</span></span>
        <span>💪 力量 <span id="strengthVal">0</span></span>
        <span>💰 <span id="goldVal">0</span></span>
        <span>✨ 余烬: <span id="emberVal">0</span></span>
    </div>
    <div id="storyUI">
        <div class="story-area" id="storyText"></div>
        <div class="choices-area" id="choicesContainer"></div>
    </div>
    <div id="battleUI" class="battle-area">
        <div class="enemies-container" id="enemiesContainer"></div>
        <div class="player-area">
            <div class="energy">⚡ 能量: <span id="energyVal">0</span>/3</div>
            <div class="card-hand" id="handCards"></div>
            <div style="display:flex; justify-content:center; gap:10px;">
                <div class="minecraft-btn" id="endTurnBtn">🔚 结束回合</div>
                <div class="minecraft-btn" id="surrenderBtn">🏳️ 投降</div>
            </div>
        </div>
    </div>
    <div class="log-area" id="logArea"><div class="log-entry">🔻 冷日计划 · 独立档案</div></div>
</div>
<script>
    // ==================== 独立剧情节点 ====================
    const secretNodes = {
        start: {
            desc: "「模拟宇宙 · 残响回廊」\n\n判官 Yakhoo123 的声音从数据洪流中传来：「你终于来了。真实宇宙已被 ET-01 焚毁，冷日计划撕裂了因果。我们需要你的帮助。」\n\n空气中弥漫着代码雨，三个片段在你眼前闪烁。",
            choices: [
                { text: "📜 追溯冷日计划的起源", next: "coldOrigin" },
                { text: "🕯️ 了解ET-01的入侵", next: "et01Invasion" },
                { text: "⚙️ 直接进入模拟核心", next: "serverRoom" }
            ]
        },
        coldOrigin: {
            desc: "「冷日计划 · 起源」\n\n无论是模拟还是真实宇宙，都执行过此计划。由 baiyin86893 负责，本意是连接现实与游戏，与志愿者 HEART1680 一起实验。\n\n突然，一段记忆碎片涌入你的意识……",
            choices: [
                { text: "深入记忆（遭遇战斗）", combat: true, enemy: { type:"normal", chapter:1, isElite:false }, next: "afterColdFight" },
                { text: "跳过，继续了解", next: "coldDetail" }
            ]
        },
        coldDetail: {
            desc: "实验最终导致宇宙不稳定，ET-01 趁虚降临。HEART1680 牺牲，baiyin86893 被模因污染，切除大脑后活了下来……\n\n你感到脊背发凉。",
            choices: [
                { text: "继续前行", next: "serverRoom" }
            ]
        },
        afterColdFight: {
            desc: "你击退了记忆中的模因污染，获得了一些余烬。",
            choices: [
                { text: "继续调查", next: "coldDetail", effect: ()=>{ player.ember += 15; addLog("获得 15 余烬"); } }
            ]
        },
        et01Invasion: {
            desc: "「ET-01 入侵」\n\n冷日计划进行到一半时，ET-01 趁虚入侵。Camera-1 在渡河授意下追捕 ET-01，却被 ET-01 用 The Book 杀死，灵魂碎裂。\n\n空气中传来低沉的嗡鸣……",
            choices: [
                { text: "尝试修复 Camera-1 的碎片", next: "cameraEvent" }
            ]
        },
        cameraEvent: {
            desc: "你收集到 Camera-1 的残余数据，但一道黑影扑来！",
            choices: [
                { text: "⚔️ 迎战", combat: true, enemy: { type:"elite", chapter:1, isElite:true }, next: "afterCamera" }
            ]
        },
        afterCamera: {
            desc: "黑影消散，你获得了一些「渡河碎片」。",
            choices: [
                { text: "继续深入", next: "serverRoom", effect: ()=>{ player.relics.push("渡河碎片"); addLog("获得遗物：渡河碎片"); } }
            ]
        },
        serverRoom: {
            desc: "「服务器事件 · 污染」\n\n你进入了模拟核心，Yakhoo123 和 BlackCat123768 正在对抗污染。Yakhoo 的污染指数显示 47% ，并且还在上升。\n\n酒馆卧底的信号若隐若现。",
            choices: [
                { text: "🤝 陪伴 Yakhoo，降低污染", next: "accompanyYakhoo" },
                { text: "🔍 调查卧底信号", next: "investigateTraitor", effect: ()=>{ addLog("你发现了一封加密信件..."); } }
            ]
        },
        accompanyYakhoo: {
            desc: "你握紧 Yakhoo 的手，污染指数下降到了 31%。祂感激地看着你：「谢谢，观测者。」",
            choices: [
                { text: "继续前进", next: "parallelUniverse" }
            ]
        },
        investigateTraitor: {
            desc: "你破译了卧底的信件，但代价是 Yakhoo 的污染上升到了 68%。你必须做出选择。",
            choices: [
                { text: "立即回去帮助 Yakhoo", next: "accompanyYakhoo" },
                { text: "继续追踪卧底", next: "traitorPath", effect: ()=>{ addLog("卧底身份暴露，但 Yakhoo 被隔离了..."); } }
            ]
        },
        traitorPath: {
            desc: "卧底被揪出，但 Yakhoo 的污染已达到 95% 并被隔离。你感到愧疚。",
            choices: [
                { text: "进入平行宇宙", next: "parallelUniverse" }
            ]
        },
        parallelUniverse: {
            desc: "「平行宇宙交错」\n\n由于渡河损坏，jjw 与另一平行宇宙交错，RIVER768（渡河碎片）出现。欢愉死魂灵 PlayMaker 正试图杀死 RIVER768。",
            choices: [
                { text: "🛡️ 保护 RIVER768", next: "protectRiver" },
                { text: "⚖️ 保持中立", next: "neutralRiver" }
            ]
        },
        protectRiver: {
            desc: "你成功击退了 PlayMaker，RIVER768 将部分渡河之力赠予你。",
            choices: [
                { text: "继续", next: "finalShowdown", effect: ()=>{ player.strength += 2; addLog("力量永久 +2（仅限本轮回）"); } }
            ]
        },
        neutralRiver: {
            desc: "PlayMaker 重伤 RIVER768，但你从残骸中找到了关键的线索。",
            choices: [
                { text: "继续", next: "finalShowdown" }
            ]
        },
        finalShowdown: {
            desc: "「终末之诗 · 冷日真相」\n\n所有线索汇聚，ET-01 的本体出现在你面前。你必须做出最后的抉择。",
            choices: [
                { text: "⚔️ 决战 ET-01", combat: true, enemy: { type:"finalBoss", chapter:4, isElite:false }, next: "trueEnding" }
            ]
        },
        trueEnding: {
            desc: "「观测即是创造。」\n\nYakhoo123 的渡河力量映照你的姓名。冷日计划的真相终于揭晓：所有轮回都指向同一个答案——你，就是打破循环的关键。\n\n你获得了隐藏成就『冷日终结者』。",
            choices: [
                { text: "返回主菜单", next: "exit" }
            ]
        },
        exit: {
            desc: "冷日档案闭合，你回到了主菜单。",
            choices: [
                { text: "离开", next: null, action: ()=>{ 
                    let raw = localStorage.getItem("YakGlobal");
                    if(raw){
                        let glob = JSON.parse(raw);
                        if(!glob.endings.includes("cold_sun_ending")) glob.endings.push("cold_sun_ending");
                        localStorage.setItem("YakGlobal", JSON.stringify(glob));
                    }
                    window.location.href = "index.html"; 
                } }
            ]
        }
    };

    // ==================== 独立玩家数据 ====================
    let player = {
        hp: 45, maxHp: 45, gold: 20, ember: 0, strength: 0, block: 0,
        relics: [], storyFlags: {}
    };
    let currentNodeId = "start";

    function addLog(msg, isGlitch=false){
        let logDiv = document.getElementById("logArea");
        if(!logDiv) return;
        let entry = document.createElement("div");
        entry.className = "log-entry";
        if(isGlitch) entry.style.color = "#ffaa88";
        entry.innerText = msg;
        logDiv.appendChild(entry);
        entry.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }

    function refreshUI(){
        document.getElementById("hpVal").innerText = player.hp;
        document.getElementById("maxHpVal").innerText = player.maxHp;
        document.getElementById("blockVal").innerText = player.block;
        document.getElementById("strengthVal").innerText = player.strength;
        document.getElementById("goldVal").innerText = player.gold;
        document.getElementById("emberVal").innerText = player.ember;
    }

    function saveGame(){
        let save = { player, currentNodeId };
        localStorage.setItem("ColdSunSave", JSON.stringify(save));
    }
    function loadGame(){
        let raw = localStorage.getItem("ColdSunSave");
        if(raw){
            try{
                let d = JSON.parse(raw);
                player = d.player;
                currentNodeId = d.currentNodeId;
                // 数据完整性修复
                if (!player.maxHp) player.maxHp = 45;
                if (!player.hp) player.hp = player.maxHp;
                if (!player.gold) player.gold = 20;
                if (!player.ember) player.ember = 0;
                if (!player.strength) player.strength = 0;
                if (!player.relics) player.relics = [];
                if (!player.block) player.block = 0;
            }catch(e){
                console.error("加载存档失败，重置游戏", e);
                localStorage.removeItem("ColdSunSave");
                player = { hp: 45, maxHp: 45, gold: 20, ember: 0, strength: 0, block: 0, relics: [], storyFlags: {} };
                currentNodeId = "start";
            }
        } else {
            player = { hp: 45, maxHp: 45, gold: 20, ember: 0, strength: 0, block: 0, relics: [], storyFlags: {} };
            currentNodeId = "start";
        }
        refreshUI();
    }

    // ==================== 独立战斗系统 ====================
    let inCombat = false;
    let currentEnemy = null;
    let deck = [], hand = [], discard = [];
    let energy = 3, block = 0, strength = 0, weak = 0, strPotCount = 0;
    let pendingReturnNode = null;

    function getStrike(){ return { name:"⚔️ 打击", type:"attack", cost:1, baseDamage:6, desc:"造成6伤害" }; }
    function getDefend(){ return { name:"🛡️ 防御", type:"skill", cost:1, baseBlock:5, desc:"获得5格挡" }; }
    function getStrengthPotion(){ return { name:"💪 力量药剂", type:"skill", cost:1, effect:()=>{ if(strPotCount>=2){ addLog("力量药剂已无法继续生效！"); return; } strength+=2; strPotCount++; }, desc:"获得2力量(限2次)" }; }
    function getRejuvenate(){ return { name:"🌿 回春", type:"skill", cost:1, effect:()=>{ player.hp = Math.min(player.maxHp, player.hp+5); }, desc:"回复5生命" }; }
    function getWhirlwind(){ return { name:"🌀 旋风斩", type:"attack", cost:2, baseDamage:8, desc:"造成8+力量伤害" }; }
    function getCleave(){ return { name:"⚔️ 横扫", type:"attack", cost:2, baseDamage:6, desc:"对全体敌人造成6+力量伤害" }; }
    function getIronHide(){ return { name:"🛡️ 铁壁", type:"skill", cost:2, baseBlock:20, desc:"获得20格挡" }; }
    function getBattleTrance(){ return { name:"🌀 战意", type:"skill", cost:1, effect:()=>drawCards(2), desc:"抽2张牌" }; }

    let playerLibrary = [
        getStrike(), getStrike(), getStrike(), getStrike(),
        getDefend(), getDefend(), getDefend(), getDefend()
    ];

    class Enemy {
        constructor(name, baseHp, baseAttack, patterns){
            this.name = name;
            this.maxHp = baseHp;
            this.hp = baseHp;
            this.attack = baseAttack;
            this.block = 0;
            this.patterns = patterns;
            this.currentIntent = null;
            this.intentValue = 0;
            this.strength = 0;
            this.turnCount = 0;
            this.intentSequence = [
                { type:"attack", damage:0 }, { type:"defend", block:8 }, { type:"buff", buffType:"strength", value:2 },
                { type:"attack", damage:0 }, { type:"debuff", debuffType:"weak", value:1 }
            ];
        }
        chooseIntent(){
            if(this.hp < this.maxHp * 0.35 && this.patterns?.some(p=>p.type==="buff" && p.buffType==="heal")){
                this.currentIntent = { type:"buff", buffType:"heal", value:12 };
                this.intentValue = 12;
                return;
            }
            let idx = this.turnCount % this.intentSequence.length;
            let baseIntent = this.intentSequence[idx];
            this.currentIntent = { ...baseIntent };
            if(this.currentIntent.type === "attack") this.intentValue = (this.currentIntent.damage || this.attack) + this.strength;
            else if(this.currentIntent.type === "defend") this.intentValue = this.currentIntent.block || 5;
            else if(this.currentIntent.type === "buff") this.intentValue = this.currentIntent.value || 0;
            else if(this.currentIntent.type === "debuff") this.intentValue = this.currentIntent.value || 0;
            this.turnCount++;
        }
        executeIntent(){
            let intent = this.currentIntent;
            if(!intent) return null;
            switch(intent.type){
                case "attack": return { type:"attack", value:this.intentValue };
                case "defend": this.block += this.intentValue; addLog(`${this.name} 获得 ${this.intentValue} 格挡。`); return null;
                case "buff":
                    if(intent.buffType === "strength"){ this.strength += this.intentValue; addLog(`${this.name} 力量 +${this.intentValue}！`); }
                    else if(intent.buffType === "heal"){ let heal = Math.min(this.maxHp - this.hp, this.intentValue); this.hp += heal; addLog(`${this.name} 恢复了 ${heal} 生命。`); }
                    return null;
                case "debuff":
                    if(intent.debuffType === "weak"){ weak = (weak||0)+this.intentValue; addLog(`你被虚弱了！`); }
                    return null;
                default: return null;
            }
        }
    }

    function createEnemy(type, chapter, isElite){
        if(type === "finalBoss") return new Enemy("✨ ET-01 投影 ✨", 150, 28, null);
        if(type === "boss") return new Enemy("石像守卫", 55, 12, null);
        if(type === "elite") return new Enemy("暗影骑士", 45, 14, null);
        return new Enemy("污染体", 28, 7, null);
    }

    function shuffleArray(arr){ for(let i=arr.length-1;i>0;i--){ let j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } }
    function drawCards(num){
        for(let i=0;i<num;i++){
            if(deck.length===0){ if(discard.length===0) break; deck=[...discard]; discard=[]; shuffleArray(deck); addLog("洗牌！"); }
            hand.push(deck.pop());
        }
        refreshBattleUI();
    }
    function playCard(index){
        let card = hand[index];
        if(card.cost > energy) return;
        energy -= card.cost;
        if(card.type === "attack"){
            let damage = card.baseDamage + strength;
            if(weak) damage = Math.floor(damage * 0.5);
            damage = Math.max(1, damage - currentEnemy.block);
            let blocked = Math.min(currentEnemy.block, card.baseDamage + strength);
            if(blocked>0){ currentEnemy.block -= blocked; addLog(`格挡抵消 ${blocked}`); }
            currentEnemy.hp -= damage;
            addLog(`打出 ${card.name}，造成 ${damage} 伤害。`);
            if(currentEnemy.hp <= 0) battleVictory();
        } else {
            if(card.baseBlock){ block += card.baseBlock; addLog(`获得 ${card.baseBlock} 格挡。`); }
            if(card.effect) card.effect();
            if(card.name === "🌀 战意") drawCards(2);
        }
        hand.splice(index,1);
        discard.push(card);
        refreshBattleUI();
    }
    function endTurn(){
        addLog("结束回合。");
        while(hand.length) discard.push(hand.pop());
        enemyTurn();
    }
    function enemyTurn(){
        let result = currentEnemy.executeIntent();
        if(result && result.type === "attack"){
            let damage = Math.max(0, result.value - block);
            if(damage > 0){ player.hp -= damage; addLog(`💥 受到 ${damage} 伤害！`); }
            else addLog(`完全格挡！`);
            block = 0;
        }
        if(player.hp <= 0) battleDefeat();
        energy = 3; block = 0; currentEnemy.block = 0; currentEnemy.chooseIntent(); drawCards(5);
        refreshBattleUI();
    }
    function battleVictory(){
        addLog("🏆 胜利！");
        let goldGain = 25, emberGain = 15;
        player.gold += goldGain;
        player.ember += emberGain;
        inCombat = false;
        document.getElementById("battleUI").style.display = "none";
        document.getElementById("storyUI").style.display = "block";
        if(pendingReturnNode){
            currentNodeId = pendingReturnNode;
            pendingReturnNode = null;
            renderStory();
            saveGame();
        }
    }
    function battleDefeat(){
        addLog("💀 战败... 冷日计划失败");
        let finalEmber = Math.floor(player.ember / 2);
        let raw = localStorage.getItem("YakGlobal");
        if(raw){
            let glob = JSON.parse(raw);
            glob.perm.ember = (glob.perm.ember||0) + finalEmber;
            localStorage.setItem("YakGlobal", JSON.stringify(glob));
        }
        localStorage.removeItem("ColdSunSave");
        alert("战斗失败，返回主菜单");
        window.location.href = "index.html";
    }
    function refreshBattleUI(){
        if(!inCombat) return;
        document.getElementById("hpVal").innerText = player.hp;
        document.getElementById("maxHpVal").innerText = player.maxHp;
        document.getElementById("blockVal").innerText = block;
        document.getElementById("strengthVal").innerText = strength;
        document.getElementById("goldVal").innerText = player.gold;
        document.getElementById("emberVal").innerText = player.ember;
        document.getElementById("energyVal").innerText = energy;
        let container = document.getElementById("enemiesContainer");
        if(container){
            container.innerHTML = "";
            let div = document.createElement("div");
            div.className = "enemy-card selected";
            let intentText = currentEnemy.currentIntent ? currentEnemy.currentIntent.type : "?";
            let intentVal = (currentEnemy.currentIntent && currentEnemy.currentIntent.type === "attack") ? ` ${currentEnemy.intentValue}` : "";
            div.innerHTML = `
                <div>${currentEnemy.name}</div>
                <div>❤️ ${currentEnemy.hp}/${currentEnemy.maxHp}</div>
                <div class="health-bar-sm"><div class="health-fill-sm" style="width:${(currentEnemy.hp/currentEnemy.maxHp)*100}%"></div></div>
                <div>🛡️ 格挡 ${currentEnemy.block}</div>
                <div>⚔️ 意图: ${intentText}${intentVal}</div>
            `;
            container.appendChild(div);
        }
        let handDiv = document.getElementById("handCards");
        if(handDiv){
            handDiv.innerHTML = "";
            for(let i=0;i<hand.length;i++){
                let card = hand[i];
                let cardDiv = document.createElement("div");
                cardDiv.className = "card";
                if(card.cost > energy) cardDiv.classList.add("disabled");
                cardDiv.innerHTML = `<div>${card.name}</div><div>⚡${card.cost}</div><div style="font-size:0.45rem">${card.desc}</div>`;
                cardDiv.onclick = () => playCard(i);
                handDiv.appendChild(cardDiv);
            }
        }
    }

    function startCombat(enemyConf, returnNode){
        inCombat = true;
        currentEnemy = createEnemy(enemyConf.type, enemyConf.chapter, enemyConf.isElite);
        pendingReturnNode = returnNode;
        deck = []; hand = []; discard = [];
        for(let card of playerLibrary) deck.push({...card});
        energy = 3; block = 0; strength = player.strength || 0; weak = 0; strPotCount = 0;
        shuffleArray(deck);
        drawCards(5);
        currentEnemy.chooseIntent();
        document.getElementById("battleUI").style.display = "block";
        document.getElementById("storyUI").style.display = "none";
        refreshBattleUI();
        addLog(`⚔️ 战斗开始！ vs ${currentEnemy.name}`);
    }

    // ==================== 剧情渲染 ====================
    function renderStory(){
        let node = secretNodes[currentNodeId];
        if(!node) node = secretNodes.start;
        document.getElementById("storyText").innerHTML = node.desc;
        let choicesDiv = document.getElementById("choicesContainer");
        choicesDiv.innerHTML = "";
        for(let choice of node.choices){
            let btn = document.createElement("div");
            btn.className = "choice-btn";
            btn.innerText = choice.text;
            btn.onclick = () => {
                if(choice.effect) choice.effect();
                if(choice.combat){
                    startCombat(choice.enemy, choice.next);
                } else {
                    if(choice.next) currentNodeId = choice.next;
                    if(choice.next === "exit") {
                        let raw = localStorage.getItem("YakGlobal");
                        if(raw){
                            let glob = JSON.parse(raw);
                            if(!glob.endings.includes("cold_sun_ending")) glob.endings.push("cold_sun_ending");
                            localStorage.setItem("YakGlobal", JSON.stringify(glob));
                        }
                        localStorage.removeItem("ColdSunSave");
                        window.location.href = "index.html";
                        return;
                    }
                    renderStory();
                    saveGame();
                }
            };
            choicesDiv.appendChild(btn);
        }
        refreshUI();
    }

    window.onload = () => {
        try {
            loadGame();
            renderStory();
        } catch(e) {
            console.error("初始化错误", e);
            document.getElementById("storyText").innerHTML = "错误：无法加载剧情，请返回主菜单重试。";
        } finally {
            let overlay = document.getElementById("loadingOverlay");
            if (overlay) overlay.style.display = "none";
        }
    };
    document.getElementById("endTurnBtn")?.addEventListener("click", endTurn);
    document.getElementById("surrenderBtn")?.addEventListener("click", battleDefeat);
</script>
</body>
</html>
